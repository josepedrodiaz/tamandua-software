<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamandua Software — Custom WordPress Development</title>
    <meta name="description" content="Custom WordPress development studio. Themes, plugins, and full websites built with precision by a father-daughter team.">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,700;1,9..144,900&family=Source+Sans+3:wght@400;500;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green-deep: #1B3D28;
            --terra: #C8553D;
            --cream: #F2E8D5;
            --bg: #FDFAF5;
            --text-secondary: #5C564D;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--green-deep);
            overflow: hidden;
            position: relative;
        }

        /* Noise texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px;
        }

        /* Warm gradient orbs */
        body::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 85, 61, 0.06) 0%, transparent 70%);
            pointer-events: none;
            animation: float 12s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-20px); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo-mark {
            margin-bottom: 2.5rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.05;
            margin-bottom: 1rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        .tagline {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--terra);
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 2rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
        }

        .contact {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
        }

        .contact a {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--terra);
            text-decoration: none;
            padding: 1rem 2.4rem;
            border-radius: 4px;
            display: inline-block;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .contact a:hover {
            background: #A8432E;
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(200, 85, 61, 0.3);
        }

        .footer-note {
            position: absolute;
            bottom: 2rem;
            font-size: 0.82rem;
            color: var(--text-secondary);
            opacity: 0.5;
            letter-spacing: 0.02em;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-mark">
            <svg viewBox="0 0 36 40" fill="none" width="56" height="64">
                <path d="M8 39 C7 39 6 30 9 19 C12 8 16 2 20 0.5" stroke="#1B3D28" stroke-width="5" stroke-linecap="round" fill="none"/>
                <path d="M14 39 C14 39 14 31 17 22 C20 13 23 8 26 6" stroke="#C8553D" stroke-width="4" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
        <h1>Tamandua Software</h1>
        <p class="tagline">He taught her to code. She reminded him why he started.</p>
        <p class="subtitle">Custom WordPress development studio. Themes, plugins, and full websites — built with craft by a father-daughter team.</p>
        <div class="contact">
            <a href="mailto:hello@tamandua-software.com">Get in touch</a>
        </div>
    </div>
    <p class="footer-note">&copy; 2026 Tamandua Software</p>
</body>
</html>
