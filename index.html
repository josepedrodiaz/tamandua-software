<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamandua Software</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fafafa;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            margin-top: 0.75rem;
        }

        a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #333;
            transition: color 0.2s, border-color 0.2s;
        }

        a:hover {
            color: #fafafa;
            border-color: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tamandua Software</h1>
        <p>Coming soon.</p>
    </div>
</body>
</html>
